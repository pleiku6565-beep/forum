# Application
spring.application.name=forum
server.port=8080
# Database
spring.datasource.url=jdbc:mysql://localhost:3306/forum?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Beanne@123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
# Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
# Spring Security
spring.security.user.name=admin
spring.security.user.password=do-not-use # overridden by SecurityConfig
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=15MB